<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUEZY Booking History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <style>
        body {
            font-family: "Manrope", sans-serif;
            background: linear-gradient(180deg, #edf5ff, #ffffff);
            min-height: 100vh;
        }

        .history-shell {
            max-width: 980px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .history-card {
            border: 1px solid #d9e5f2;
            border-radius: 1rem;
            box-shadow: 0 14px 28px rgba(18, 36, 68, 0.08);
        }

        .table thead th {
            white-space: nowrap;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <main class="history-shell">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <div>
                <h1 class="h4 mb-1">Booking History</h1>
                <p class="text-muted mb-0">Stored from your frontend session data.</p>
            </div>
            <a href="/" class="btn btn-primary">Back to Home</a>
        </div>

        <div class="card history-card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>Name</th>
                                <th>Clinic</th>
                                <th>Doctor / Provider</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody"></tbody>
                    </table>
                </div>
                <p id="emptyState" class="text-muted mb-0 d-none">No bookings found in local storage.</p>
            </div>
        </div>
    </main>

    <script>
        const BOOKING_HISTORY_KEY = "quezy_booking_history";
        const tableBody = document.getElementById("historyTableBody");
        const emptyState = document.getElementById("emptyState");

        function readHistory() {
            try {
                const raw = localStorage.getItem(BOOKING_HISTORY_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                return [];
            }
        }

        function formatAmount(value) {
            if (value === null || value === undefined || value === "--") return "--";
            const amount = Number(value);
            if (!Number.isFinite(amount)) return String(value);
            return `INR ${amount}`;
        }

        function renderHistory() {
            const history = readHistory();

            if (!history.length) {
                if (emptyState) emptyState.classList.remove("d-none");
                return;
            }

            if (emptyState) emptyState.classList.add("d-none");

            history.forEach((item) => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${item.bookingId || "--"}</td>
                    <td>${item.name || "--"}</td>
                    <td>${item.clinic || "--"}</td>
                    <td>${item.doctor || "--"}</td>
                    <td>${item.bookingDate || "--"}</td>
                    <td>${item.timeSlot || "--"}</td>
                    <td>${formatAmount(item.totalAmount)}</td>
                    <td>${item.status || "Booked"}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        renderHistory();
    </script>
</body>
</html>
